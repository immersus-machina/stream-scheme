name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: '10.0.x'

      - name: Restore
        run: dotnet restore

      - name: Build
        run: dotnet build --no-restore -c Release

      - name: Test C#
        run: dotnet run --no-build -c Release --project test/StreamScheme.Test/StreamScheme.Test.csproj

      - name: Test F#
        run: dotnet run --no-build -c Release --project test/StreamScheme.FSharp.Test/StreamScheme.FSharp.Test.fsproj
